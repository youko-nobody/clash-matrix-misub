# Clash Matrix Studio - Matrix built-in template
#
# Public, redacted copy of the current default Matrix template.
# No real proxy nodes, subscription URLs, share tokens, UUIDs, passwords, keys, or dashboard custom rules are included.
mixed-port: 7890
allow-lan: false
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
proxies: []
profile:
  store-selected: true
  store-fake-ip: true
  subscription-url: ""
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - ♻️ 自动测速
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
  - name: Emby代理
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png
  - name: TG
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
  - name: AI
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png
  - name: YOUTUBE
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
  - name: TIKTOK
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok.png
  - name: FINAL
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png
  - name: BLOCK
    type: select
    proxies:
      - REJECT
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Reject.png
  - name: APPLE
    type: select
    proxies:
      - DIRECT
      - PROXY
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
  - name: BANK
    type: select
    proxies:
      - DIRECT
      - PROXY
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png
  - name: FINANCE
    type: select
    proxies:
      - DIRECT
      - PROXY
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png
  - name: FAKE-LOCATION
    type: select
    proxies:
      - PROXY
      - DIRECT
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Rainbow.png
  - name: ♻️ 自动测速
    type: url-test
    proxies:
      - DIRECT
    url: http://www.google.com/blank.html
    interval: 300
    tolerance: 50
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png
